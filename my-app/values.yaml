replicaCount: 3

image:
  repository: ghcr.io/julenhopp/k8s-custom-nginx
  pullPolicy: IfNotPresent
  tag: "f8a5cf57db004e4b389730d92cbbfda5625582f3"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: "nginx"
  annotations: {}
  hosts:
    - host: app.tec.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80


nodeSelector: {}
tolerations: []
affinity: {}

volumeMounts: []
volumes: []
persistence:
  enabled: false
  size: 500Mi
